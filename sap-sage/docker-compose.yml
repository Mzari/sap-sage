version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sapsage-postgres
    environment:
      POSTGRES_DB: sapsage
      POSTGRES_USER: sapsage
      POSTGRES_PASSWORD: sapsage_secure_2024
    ports:
      - "5432:5432"
    volumes:
      - ./database/data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    networks:
      - sapsage-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sapsage"]
      interval: 10s
      timeout: 5s
      retries: 5

  n8n:
    image: n8nio/n8n:latest
    container_name: sapsage-n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=sapsage2024
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_ENCRYPTION_KEY=sapsage_encryption_key_2024
    ports:
      - "5678:5678"
    volumes:
      - ./n8n:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - sapsage-network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sapsage-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sapsage.com
      PGADMIN_DEFAULT_PASSWORD: admin2024
      PGADMIN_LISTEN_PORT: 80
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - sapsage-network

networks:
  sapsage-network:
    driver: bridge
