name: Weekly Knowledge Refresh

on:
  schedule:
    - cron: "0 2 * * 0"   # 2 AM UTC every Sunday
  workflow_dispatch:        # Manual trigger button in GitHub Actions UI

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run knowledge refresh
        run: node scripts/knowledge-refresh.js
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Build frontend
        run: npm run build

      - name: Configure Git
        run: |
          git config user.email "bot@sap-sage.ai"
          git config user.name "SAP Sage Bot"

      - name: Commit and push changes
        run: |
          git add -A
          git diff --staged --quiet || git commit -m "auto: weekly knowledge refresh $(date +%Y-%m-%d)"
          git push
